name: Publish VSCode Extension

# 推送形如 vscode-v0.1.0 的 tag 时触发：构建并发布到 VS Code Marketplace。
#
# 采用 Personal Access Token（PAT）方式——对个人开发者最易上手、无需 Azure 订阅。
# （Entra/OIDC「免 PAT」方式需要在 Azure 订阅下创建托管标识，个人账号通常没有订阅，
#  且 vsce --azure-credential 对服务主体仍有未决问题，故暂用 PAT；PAT 至 2026-12-01 前有效。）
#
# 一次性前置配置（入口 URL 已核对）：
#   1. 登录 https://dev.azure.com （用与发布者 AkagiYui 同一个 Microsoft 账号；
#      若没有组织，会提示免费新建一个，按默认创建即可）。
#      —— 注意：不是 manage.visualstudio.com（那是 VS 订阅门户，会提示「找不到订阅」）。
#   2. 右上角头像旁 User settings → Personal access tokens，新建令牌：
#        Organization 选「All accessible organizations」；
#        Scopes 点「Show all scopes」→ 找到 Marketplace → 勾选 Manage；
#      创建后复制令牌（只显示一次）。
#   3. GitHub 仓库 → Settings → Secrets and variables → Actions → New repository secret，
#      名称 VSCE_PAT，值为上面的令牌。
#   （发布者管理页：https://marketplace.visualstudio.com/manage/publishers/AkagiYui）
on:
  push:
    tags:
      - 'vscode-v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 'latest'

      - name: Enable pnpm (corepack)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 校验 tag 版本号与扩展 package.json 一致（tag 去掉 vscode-v 前缀）
      - name: Verify tag matches extension version
        working-directory: dapume-vscode
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#vscode-v}
          echo "tag=$TAG package=$PKG"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match dapume-vscode version $PKG"
            exit 1
          fi

      # 先构建依赖库，再构建扩展（扩展会把 dapume-js 打包进产物）。
      - name: Build dapume-js
        run: pnpm --filter dapume-js build

      - name: Build extension
        run: pnpm --filter dapume-vscode build

      # 发布到 Marketplace（--no-dependencies：依赖已由 tsdown 打包）。
      - name: Publish to VS Code Marketplace
        working-directory: dapume-vscode
        run: npx -y @vscode/vsce publish --no-dependencies -p "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
