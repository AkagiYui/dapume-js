name: Publish VSCode Extension

# 推送形如 vscode-v0.1.0 的 tag 时触发：构建并发布到 VS Code Marketplace。
#
# 采用 Microsoft Entra ID + 工作负载身份联合（OIDC）「免 PAT」发布：
# GitHub 颁发 OIDC 令牌 → azure/login 联合登录为「用户分配的托管标识」→
# vsce 用该 Entra 凭据换取 Marketplace 令牌并发布。无任何长期机密。
# （Azure DevOps 全局 PAT 将于 2026-12-01 停用，故弃用 PAT 方式。）
#
# 一次性前置配置见仓库 README / 本轮回复，简述：
#   1. Azure 建「用户分配的托管标识」，记下 Client ID / Tenant ID；
#   2. 给它加 GitHub 联合凭据：issuer=token.actions.githubusercontent.com，
#      subject=repo:AkagiYui/dapume-js:environment:vscode-marketplace，
#      audience=api://AzureADTokenExchange；
#   3. 在 Marketplace 管理页把该托管标识加为发布者 AkagiYui 的成员；
#   4. GitHub 建环境 vscode-marketplace，加仓库变量 AZURE_CLIENT_ID / AZURE_TENANT_ID。
on:
  push:
    tags:
      - 'vscode-v*'

permissions:
  contents: read
  id-token: write # 获取 GitHub OIDC 令牌以联合登录 Azure（免机密）

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: vscode-marketplace # 与联合凭据 subject 对应，并集中管理其变量
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 'latest'

      - name: Enable pnpm (corepack)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 校验 tag 版本号与扩展 package.json 一致（tag 去掉 vscode-v 前缀）
      - name: Verify tag matches extension version
        working-directory: dapume-vscode
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#vscode-v}
          echo "tag=$TAG package=$PKG"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match dapume-vscode version $PKG"
            exit 1
          fi

      # 先构建依赖库，再构建扩展（扩展会把 dapume-js 打包进产物）。
      - name: Build dapume-js
        run: pnpm --filter dapume-js build

      - name: Build extension
        run: pnpm --filter dapume-vscode build

      # 通过 OIDC 联合凭据登录 Azure（无长期机密）。
      # 仅为换取 Marketplace 令牌，托管标识无需任何订阅 RBAC 角色，故 allow-no-subscriptions。
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      # 用 Entra 凭据发布：vsce 经 az 登录会话换取 Marketplace 令牌（--no-dependencies：依赖已由 tsdown 打包）。
      - name: Publish to VS Code Marketplace
        working-directory: dapume-vscode
        run: npx -y @vscode/vsce publish --no-dependencies --azure-credential
